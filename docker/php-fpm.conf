; docker/php-fpm.conf — overrides for the default www pool.
; Drop this file into /usr/local/etc/php-fpm.d/ via the Dockerfile.

[www]
; Run workers as www-data (matches Nginx and file ownership in /app).
user  = www-data
group = www-data

; TCP socket — must match nginx fastcgi_pass address.
listen = 127.0.0.1:9000
listen.owner = www-data
listen.group = www-data

; Dynamic pool: Railway's starter plan has 512 MB RAM.
; max_children * ~30 MB/worker ≈ safe ceiling for that tier.
pm                   = dynamic
pm.max_children      = 10
pm.start_servers     = 2
pm.min_spare_servers = 1
pm.max_spare_servers = 4
pm.max_requests      = 500     ; recycle workers to prevent memory leaks

; Set the working directory to the app root so relative paths work.
chdir = /app

; Surface PHP errors/notices in Railway's log stream.
php_flag[display_errors]  = off
php_value[error_log]      = /dev/stderr
php_flag[log_errors]      = on
